<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" placeholder="Skriv ditt navn" id="name">
    <input type="text" placeholder="Skriv din Karakter" id="grade">
    <button onclick="checkGrade()">Sjekk Alder</button>
    <p id="output"></p>

    <script>
        function checkGrade() {
            let name = document.getElementById("name").value
            let grade = document.getElementById("grade").value
            let output = document.getElementById("output")
            if ( grade>= 90) {
                output.innerHTML =  "A";
            } else if ( grade>= 70) {
                 output.innerHTML = "B";
            } else if ( grade>= 50) {
                 output.innerHTML = "C";
            } else {
                 output.innerHTML = "Stryk";
            }
        }

    </script>
</body>

</html>
