<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app">
        <p id="output"></p>
    </div>


    <script>
        function makeImg(src, alt) {
            return `<img src="${src}" alt="${alt}" >`
        }

        function makeProfileCard(navn, imgUrl) {
            return `<div>
            ${makeImg(imgUrl, navn)}
                <h3>Hei ${navn}</h3>
                </div>`
        }

        document.getElementById("output").innerHTML = makeProfileCard("Ole", "placeholder")
    </script>
</body>

</html>
