<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app">
        <p id="output"></p>
    </div>

    <script>

        function makeCard(title, text) {
            return `<div class="card">
                <h2>${title}</h2>
                <p>${text}</p>
                </div>`
        }

        let myCard = makeCard("HTML", "HTML brukes til å bygge sider")

        let jsCard = makeCard("JavaScript", "JavaScript legger til funksjoner til en nettside")

        document.getElementById("output").innerHTML = `${myCard} ${jsCard}`

    </script>

</body>

</html>
