<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app"></div>
    <script>

        //Model
      let model = 0;  


      //View
      function updateView() {
        document.getElementById("app").innerHTML = /*HTML*/ `
        <h1>Min clicker spill</h1>
        <p id="output">Mine poeng:${model} </p>
        <button onclick="increasePoint()">Increase</button>
        <button onclick="decreasePoint()">Decrease</button>
        `;
      }

      //Controller
      function increasePoint(){
        model += 1;
        updateView()
      }

      function decreasePoint(){
        model -= 1;
        updateView()
      }



      updateView();
    </script>
  </body>
</html>
