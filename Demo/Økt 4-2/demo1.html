<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      #board {
        display: grid;
        grid-template-columns: repeat(8, 100px);
        grid-template-rows: repeat(8, 100px);
      }

      .lightSquare {
        background-color: rgb(240, 217, 181);
      }

      .darkSquare {
        background-color: rgb(181, 136, 99);
      }
    </style>
  </head>
  <body>
    <div id="board"></div>

    <script>
      function drawBoard() {
        document.getElementById("board").innerHTML = `<div class="lightSquare"></div>
      <div class="darkSquare"></div>`.repeat(4)
      }

      drawBoard()
    </script>
  </body>
</html>
